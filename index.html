<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Board Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --error: #dc2626;
    --border: #d1d5db;
    --bg: #f9fafb;
    --card-bg: #ffffff;
    --text: #111827;
    --text-muted: #6b7280;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 1.75rem;
    margin-bottom: 1.5rem;
  }

  .controls {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .field { display: flex; flex-direction: column; }

  label {
    font-size: 0.875rem;
    font-weight: 600;
    display: block;
    margin-bottom: 0.25rem;
  }

  select, input[type="file"], input[type="number"] {
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
  }

  input[type="number"] { width: 80px; }
  select { cursor: pointer; }

  textarea {
    width: 100%;
    min-height: 200px;
    font-size: 0.875rem;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    resize: vertical;
    font-family: inherit;
  }

  textarea:focus, select:focus, input[type="number"]:focus {
    outline: 2px solid var(--primary);
    outline-offset: -1px;
  }

  .btn {
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.5rem 1rem;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: #e5e7eb;
    color: var(--text);
  }
  .btn-secondary:hover:not(:disabled) { background: #d1d5db; }
  .btn-secondary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-download {
    background: #059669;
    color: #fff;
  }
  .btn-download:hover:not(:disabled) { background: #047857; }
  .btn-download:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error-msg {
    color: var(--error);
    font-size: 0.875rem;
    font-weight: 500;
    margin-top: 0.5rem;
  }

  .item-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  .textarea-wrapper {
    display: none;
    margin-bottom: 1rem;
  }
  .textarea-wrapper.open { display: block; }

  .actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .progress-bar-wrapper {
    display: none;
    margin-top: 0.75rem;
  }
  .progress-bar-wrapper.visible { display: block; }
  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    width: 0%;
    transition: width 0.15s;
  }
  .progress-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  /* Board */
  .board-container {
    margin-top: 1.5rem;
  }

  .board {
    display: grid;
    gap: 2px;
    background: #374151;
    border: 2px solid #374151;
    border-radius: var(--radius);
    overflow: hidden;
    max-width: 700px;
    margin: 0 auto;
  }

  .cell {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    word-break: break-word;
    aspect-ratio: 1;
    overflow: hidden;
  }

  .cell.free-space {
    background: #fef3c7;
  }

  .cell.free-space img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
  }

  .free-space-default {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
  }

  /* Print styles */
  @media print {
    body { padding: 0; background: #fff; }
    .controls, .actions, h1 { display: none !important; }
    .board-container { margin-top: 0; }
    .board {
      max-width: 100%;
      border-radius: 0;
      gap: 1px;
    }
    .cell {
      font-size: 10pt;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Bingo Board Generator</h1>

  <div class="controls">
    <div class="row">
      <div class="field">
        <label for="dimension">Board Size</label>
        <select id="dimension">
          <option value="5">5 &times; 5</option>
          <option value="7">7 &times; 7</option>
          <option value="9">9 &times; 9</option>
          <option value="11">11 &times; 11</option>
        </select>
      </div>
      <div class="field">
        <label for="boardCount">Number of Boards</label>
        <input type="number" id="boardCount" min="1" max="500" value="1">
      </div>
      <div class="field">
        <label for="freeSpaceUpload">Free Space Image</label>
        <input type="file" id="freeSpaceUpload" accept="image/*">
      </div>
    </div>

    <div class="row">
      <button class="btn btn-secondary" id="toggleListBtn">Show Item List</button>
    </div>

    <div class="textarea-wrapper" id="textareaWrapper">
      <label for="itemList">Items (one per line)</label>
      <textarea id="itemList" placeholder="Enter bingo items, one per line..."></textarea>
      <div class="item-count" id="itemCount"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="generateBtn" disabled>Generate Preview</button>
      <button class="btn btn-secondary" id="regenerateBtn" style="display:none">Shuffle</button>
      <button class="btn btn-secondary" id="printBtn" style="display:none">Print</button>
      <button class="btn btn-download" id="downloadBtn" disabled>Download ZIP</button>
    </div>

    <div class="progress-bar-wrapper" id="progressWrapper">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
  </div>

  <div class="board-container" id="boardContainer"></div>
</div>

<script src="vendor/jspdf.umd.min.js"></script>
<script src="vendor/jszip.min.js"></script>
<script>
(function() {
  var STORAGE_KEY = 'bingomaker_config';

  var dimensionEl = document.getElementById('dimension');
  var boardCountEl = document.getElementById('boardCount');
  var freeSpaceUploadEl = document.getElementById('freeSpaceUpload');
  var toggleListBtn = document.getElementById('toggleListBtn');
  var textareaWrapper = document.getElementById('textareaWrapper');
  var itemListEl = document.getElementById('itemList');
  var itemCountEl = document.getElementById('itemCount');
  var errorMsgEl = document.getElementById('errorMsg');
  var generateBtn = document.getElementById('generateBtn');
  var regenerateBtn = document.getElementById('regenerateBtn');
  var printBtn = document.getElementById('printBtn');
  var downloadBtn = document.getElementById('downloadBtn');
  var boardContainer = document.getElementById('boardContainer');
  var progressWrapper = document.getElementById('progressWrapper');
  var progressFill = document.getElementById('progressFill');
  var progressLabel = document.getElementById('progressLabel');

  var freeSpaceDataUrl = null;

  // --- LocalStorage persistence ---
  function saveConfig() {
    try {
      var config = {
        dimension: dimensionEl.value,
        boardCount: boardCountEl.value,
        items: itemListEl.value,
        freeSpaceDataUrl: freeSpaceDataUrl
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
    } catch (e) { /* ignore quota errors */ }
  }

  function loadConfig() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var config = JSON.parse(raw);
      if (config.dimension) dimensionEl.value = config.dimension;
      if (config.boardCount) boardCountEl.value = config.boardCount;
      if (config.items) itemListEl.value = config.items;
      if (config.freeSpaceDataUrl) freeSpaceDataUrl = config.freeSpaceDataUrl;
    } catch (e) { /* ignore */ }
  }

  // --- Validation ---
  function getItems() {
    return itemListEl.value
      .split('\n')
      .map(function(line) { return line.trim(); })
      .filter(function(line) { return line.length > 0; });
  }

  function validate() {
    var dim = parseInt(dimensionEl.value, 10);
    var items = getItems();
    var needed = dim * dim - 1;

    itemCountEl.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' entered';

    if (items.length < needed) {
      errorMsgEl.textContent = 'Need at least ' + needed + ' items for a ' + dim + '\u00d7' + dim + ' board (you have ' + items.length + ')';
      generateBtn.disabled = true;
      downloadBtn.disabled = true;
      return false;
    }

    errorMsgEl.textContent = '';
    generateBtn.disabled = false;
    downloadBtn.disabled = false;
    return true;
  }

  // --- Board generation (data only) ---
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i];
      a[i] = a[j];
      a[j] = tmp;
    }
    return a;
  }

  function generateBoardData(dim, items) {
    var needed = dim * dim - 1;
    var centerIndex = Math.floor((dim * dim) / 2);
    var selected = shuffle(items).slice(0, needed);
    var cells = [];
    var itemIdx = 0;
    for (var i = 0; i < dim * dim; i++) {
      if (i === centerIndex) {
        cells.push({ type: 'free' });
      } else {
        cells.push({ type: 'item', text: selected[itemIdx] });
        itemIdx++;
      }
    }
    return cells;
  }

  // --- DOM preview ---
  function renderBoardPreview(cells, dim) {
    boardContainer.innerHTML = '';
    var board = document.createElement('div');
    board.className = 'board';
    board.style.gridTemplateColumns = 'repeat(' + dim + ', 1fr)';

    for (var i = 0; i < cells.length; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      var c = cells[i];

      if (c.type === 'free') {
        cell.classList.add('free-space');
        if (freeSpaceDataUrl) {
          var img = document.createElement('img');
          img.src = freeSpaceDataUrl;
          img.alt = 'Free Space';
          cell.appendChild(img);
        } else {
          var span = document.createElement('span');
          span.className = 'free-space-default';
          span.textContent = '\u2B50';
          cell.appendChild(span);
          var lbl = document.createElement('div');
          lbl.style.fontSize = '0.65rem';
          lbl.style.color = '#92400e';
          lbl.textContent = 'FREE';
          cell.appendChild(lbl);
        }
      } else {
        cell.textContent = c.text;
      }

      board.appendChild(cell);
    }

    boardContainer.appendChild(board);
    regenerateBtn.style.display = '';
    printBtn.style.display = '';
    saveConfig();
  }

  function handleGenerate() {
    if (!validate()) return;
    var dim = parseInt(dimensionEl.value, 10);
    var items = getItems();
    var cells = generateBoardData(dim, items);
    renderBoardPreview(cells, dim);
  }

  // --- PDF generation ---
  function renderBoardToPdf(doc, cells, dim) {
    // Letter size: 215.9mm x 279.4mm
    var pageW = 215.9;
    var pageH = 279.4;
    var margin = 15;
    var titleH = 12;
    var gridTop = margin + titleH + 5;
    var available = Math.min(pageW - 2 * margin, pageH - gridTop - margin);
    var cellSize = available / dim;
    var gridW = cellSize * dim;
    var offsetX = (pageW - gridW) / 2;

    // Title
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('BINGO', pageW / 2, margin + titleH, { align: 'center' });

    // Grid lines & cells
    var lineWidth = 0.4;
    doc.setLineWidth(lineWidth);
    doc.setDrawColor(55, 65, 81);

    for (var i = 0; i < cells.length; i++) {
      var row = Math.floor(i / dim);
      var col = i % dim;
      var x = offsetX + col * cellSize;
      var y = gridTop + row * cellSize;
      var c = cells[i];

      // Fill free space background
      if (c.type === 'free') {
        doc.setFillColor(254, 243, 199);
        doc.rect(x, y, cellSize, cellSize, 'F');
      }

      // Cell border
      doc.rect(x, y, cellSize, cellSize, 'S');

      // Cell content
      var centerX = x + cellSize / 2;
      var centerY = y + cellSize / 2;

      if (c.type === 'free') {
        if (freeSpaceDataUrl) {
          // Embed the uploaded image
          var imgSize = cellSize * 0.7;
          var imgX = centerX - imgSize / 2;
          var imgY = centerY - imgSize / 2;
          try {
            doc.addImage(freeSpaceDataUrl, imgX, imgY, imgSize, imgSize);
          } catch (e) {
            // Fallback to text if image fails
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(79, 70, 229);
            doc.text('FREE', centerX, centerY + 1, { align: 'center', baseline: 'middle' });
          }
        } else {
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(79, 70, 229);
          doc.text('FREE', centerX, centerY + 1, { align: 'center', baseline: 'middle' });
        }
        doc.setTextColor(0, 0, 0);
      } else {
        // Determine font size based on text length and cell size
        var text = c.text;
        var maxFontSize = dim <= 5 ? 10 : dim <= 7 ? 8 : 6;
        var fontSize = maxFontSize;
        doc.setFont('helvetica', 'normal');

        // Wrap text into lines that fit
        var maxWidth = cellSize - 4;
        doc.setFontSize(fontSize);
        var lines = doc.splitTextToSize(text, maxWidth);

        // Reduce font if too many lines
        while (lines.length * (fontSize * 0.4) > cellSize - 4 && fontSize > 4) {
          fontSize--;
          doc.setFontSize(fontSize);
          lines = doc.splitTextToSize(text, maxWidth);
        }

        var lineHeight = fontSize * 0.4;
        var totalTextH = lines.length * lineHeight;
        var startY = centerY - totalTextH / 2 + lineHeight * 0.65;

        for (var l = 0; l < lines.length; l++) {
          doc.text(lines[l], centerX, startY + l * lineHeight, { align: 'center' });
        }
      }
    }
  }

  function showProgress(current, total) {
    progressWrapper.classList.add('visible');
    var pct = Math.round((current / total) * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = 'Generating board ' + current + ' of ' + total + '...';
  }

  function hideProgress() {
    progressWrapper.classList.remove('visible');
    progressFill.style.width = '0%';
    progressLabel.textContent = '';
  }

  function handleDownload() {
    if (!validate()) return;

    var dim = parseInt(dimensionEl.value, 10);
    var count = parseInt(boardCountEl.value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 500) count = 500;

    var items = getItems();
    downloadBtn.disabled = true;
    generateBtn.disabled = true;

    if (count === 1) {
      // Single board: just download one PDF directly
      showProgress(1, 1);
      setTimeout(function() {
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
        var cells = generateBoardData(dim, items);
        renderBoardToPdf(doc, cells, dim);
        doc.save('bingo-board.pdf');
        hideProgress();
        validate(); // re-enable buttons
      }, 50);
      return;
    }

    // Multiple boards: generate PDFs and zip them
    var zip = new JSZip();
    var generated = 0;
    var padLen = String(count).length;

    function padNum(n) {
      var s = String(n);
      while (s.length < padLen) s = '0' + s;
      return s;
    }

    function generateNext() {
      generated++;
      showProgress(generated, count);

      var jsPDF = window.jspdf.jsPDF;
      var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
      var cells = generateBoardData(dim, items);
      renderBoardToPdf(doc, cells, dim);

      var pdfData = doc.output('arraybuffer');
      zip.file('bingo-board-' + padNum(generated) + '.pdf', pdfData);

      if (generated < count) {
        // Yield to UI thread between boards
        setTimeout(generateNext, 0);
      } else {
        progressLabel.textContent = 'Compressing ZIP...';
        zip.generateAsync({ type: 'blob' }).then(function(blob) {
          // Trigger download
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'bingo-boards-' + dim + 'x' + dim + '-x' + count + '.zip';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          hideProgress();
          validate(); // re-enable buttons
        });
      }
    }

    setTimeout(generateNext, 50);
  }

  // --- Event listeners ---
  toggleListBtn.addEventListener('click', function() {
    var open = textareaWrapper.classList.toggle('open');
    toggleListBtn.textContent = open ? 'Hide Item List' : 'Show Item List';
  });

  itemListEl.addEventListener('input', function() {
    validate();
    saveConfig();
  });

  dimensionEl.addEventListener('change', function() {
    validate();
    saveConfig();
  });

  boardCountEl.addEventListener('change', function() {
    saveConfig();
  });

  freeSpaceUploadEl.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      freeSpaceDataUrl = ev.target.result;
      saveConfig();
    };
    reader.readAsDataURL(file);
  });

  generateBtn.addEventListener('click', handleGenerate);
  regenerateBtn.addEventListener('click', handleGenerate);
  downloadBtn.addEventListener('click', handleDownload);

  printBtn.addEventListener('click', function() {
    window.print();
  });

  // --- Init ---
  loadConfig();
  if (itemListEl.value.trim().length > 0) {
    textareaWrapper.classList.add('open');
    toggleListBtn.textContent = 'Hide Item List';
  }
  validate();
})();
</script>

</body>
</html>
